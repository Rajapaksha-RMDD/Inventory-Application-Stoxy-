name: stoxy
description: "A new Flutter project for inventory or stock management."
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # --- Firebase Suite ---
  firebase_core: ^3.11.0
  firebase_auth: ^5.4.1
  cloud_firestore: ^5.6.1

  # --- State Management & Logic ---
  provider: ^6.1.1
  http: ^1.2.0
  shared_preferences: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true

  # Assets and Fonts are commented out until you create the folders and add the files.
  # To use these, create an 'assets' folder in your project root, then 'images' and 'fonts' subfolders.

  # assets:
  #   - assets/images/

  # fonts:
  #   - family: Montserrat
  #     fonts:
  #       - asset: assets/fonts/Montserrat-Regular.ttf
  #       - asset: assets/fonts/Montserrat-Bold.ttf
  #         weight: 700